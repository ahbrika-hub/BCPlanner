name: Deploy migrations to production

# Applies Supabase migrations to the PRODUCTION database on merge to main.
# Auth/password come from repo secrets (never hardcoded):
#   SUPABASE_ACCESS_TOKEN  — account access token (read by `supabase link`/`db push`)
#   SUPABASE_DB_PASSWORD   — production DB password (read non-interactively)
on:
  push:
    branches: [main]
    # Only run when DB-related files change. Remove this `paths:` block to run
    # on every merge to main (db push is a safe no-op when nothing is pending).
    paths:
      - "supabase/migrations/**"
      - "supabase/config.toml"
      - ".github/workflows/db-push-production.yml"
  workflow_dispatch: {} # allow manual runs from the Actions tab

# Never run two production pushes at once; don't cancel an in-flight one.
concurrency:
  group: db-push-production
  cancel-in-progress: false

jobs:
  push:
    name: supabase db push (production)
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PROJECT_REF: cssxmqwdeiibewucorjx # production (non-secret)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          # Pinned (not "latest") so setup doesn't hit the rate-limited GitHub
          # API call that resolves the newest release.
          version: 2.105.0

      - name: Link production project
        run: supabase link --project-ref "$PROJECT_REF"

      - name: Push migrations
        run: supabase db push
