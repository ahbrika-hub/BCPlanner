name: Inspect production DB (read-only)

# TEMPORARY, READ-ONLY diagnostic. It links to the PRODUCTION project and prints:
#   1. the migration history (local vs remote) so we can see the divergent versions
#   2. the existing public-schema DDL so we know what the old 0001-0006 migrations created
# It NEVER writes to the database (no db push / reset / repair here).
# Runs automatically when this file changes on the feature branch, or on demand.
on:
  push:
    branches: [claude/p1-repo-tooling-foundation-eZnVB]
    paths:
      - ".github/workflows/db-inspect-production.yml"
  workflow_dispatch: {}

jobs:
  inspect:
    name: inspect production (read-only)
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PROJECT_REF: cssxmqwdeiibewucorjx # production (non-secret)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link production project
        run: supabase link --project-ref "$PROJECT_REF"

      - name: Migration history (local vs remote)
        run: supabase migration list

      - name: Existing public-schema DDL (no data)
        continue-on-error: true
        run: |
          supabase db dump --linked --schema public -f schema_public.sql
          echo "===== BEGIN public-schema DDL ====="
          cat schema_public.sql
          echo "===== END public-schema DDL ====="

      - name: Tracked migration versions on remote
        continue-on-error: true
        run: |
          supabase db dump --linked --schema supabase_migrations -f migrations_meta.sql
          echo "===== BEGIN supabase_migrations DDL/data ====="
          cat migrations_meta.sql
          echo "===== END supabase_migrations ====="
